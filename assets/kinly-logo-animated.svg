<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 572">
<defs><linearGradient id="gl" gradientUnits="userSpaceOnUse" x1="120" y1="90" x2="300" y2="420"><stop offset="0" stop-color="#F44E06"/><stop offset="1" stop-color="#F97D1E"/></linearGradient><linearGradient id="gr" gradientUnits="userSpaceOnUse" x1="240" y1="90" x2="430" y2="420"><stop offset="0" stop-color="#F5921B"/><stop offset="1" stop-color="#FBB151"/></linearGradient><linearGradient id="gt" gradientUnits="userSpaceOnUse" x1="131" y1="497" x2="381" y2="497"><stop offset="0" stop-color="#F4500A"/><stop offset="1" stop-color="#FBB151"/></linearGradient></defs>
<style>
  .figL { animation: shiftL 1.5s cubic-bezier(.22,.9,.3,1) both; }
  .figR, .patch { animation: shiftR 1.5s cubic-bezier(.22,.9,.3,1) both; }
  .armL { transform-origin: 238.7px 229.3px; animation: sweepL 1.5s .1s cubic-bezier(.4,0,.3,1) both; }
  .armR { transform-origin: 273.3px 229.3px; animation: sweepR 1.5s .1s cubic-bezier(.4,0,.3,1) both; }
  .wordmark { animation: fadeUp .6s 1.25s cubic-bezier(.22,.9,.3,1) both; }
  @keyframes shiftL { from { transform: translateX(-35px); } to { transform: none; } }
  @keyframes shiftR { from { transform: translateX(35px); } to { transform: none; } }
  @keyframes sweepL { 0% { transform: rotate(-46deg); } 78% { transform: rotate(5deg); } 100% { transform: none; } }
  @keyframes sweepR { 0% { transform: rotate(46deg); } 78% { transform: rotate(-5deg); } 100% { transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .figL,.figR,.patch,.armL,.armR,.wordmark { animation: none; } }
</style>
